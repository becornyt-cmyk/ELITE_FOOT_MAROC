<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Foot Maroc</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#f5c518;--dark:#0a0a0a;--card:#161616;--card2:#1e1e1e;--border:#2a2a2a;--text:#e0e0e0;--sub:#888}
body{font-family:'Roboto',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.3rem;font-weight:900;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.logo span{color:#fff}
.nav-tabs{display:flex;gap:4px}
.tab-btn{background:none;border:none;color:var(--sub);font-family:'Roboto',sans-serif;font-size:.9rem;font-weight:500;padding:8px 18px;border-radius:8px;cursor:pointer;transition:.2s;position:relative;letter-spacing:.5px}
.tab-btn:hover{color:#fff;background:var(--border)}
.tab-btn.active{color:var(--gold);background:rgba(245,197,24,.1)}
.cart-badge{position:absolute;top:2px;right:6px;background:var(--gold);color:#000;font-size:.6rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.cart-badge.show{opacity:1}
.page{display:none;padding-top:80px;min-height:100vh}
.page.active{display:block}
.shop-header{text-align:center;padding:30px 20px 10px}
.shop-header h1{font-size:2rem;font-weight:900;color:#fff}
.shop-header h1 span{color:var(--gold)}
.shop-header p{color:var(--sub);margin-top:6px;font-size:.9rem}
.free-ship-banner{background:linear-gradient(90deg,#0a3d0a,#1a6b1a,#0a3d0a);color:#4ade80;text-align:center;padding:10px;font-size:.85rem;font-weight:600;margin:10px 20px;border-radius:8px;border:1px solid #1a6b1a}
.category{padding:20px}
.cat-title{font-size:1rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:30px}
@media(min-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px}}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.3s}
.card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 12px 30px rgba(245,197,24,.12)}
.card-img-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:#111;position:relative}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:.4s}
.card:hover .card-img-wrap img{transform:scale(1.07)}
.card-body{padding:12px}
.card-title{font-size:.82rem;font-weight:600;color:#fff;margin-bottom:6px;line-height:1.3;min-height:32px}
.card-price{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:10px}
.add-btn{width:100%;padding:9px;background:var(--gold);color:#000;border:none;border-radius:8px;font-family:'Roboto',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px}
.add-btn:hover{background:#ffd700;transform:scale(1.02)}
.add-btn:active{transform:scale(.97)}
.cart-page{max-width:680px;margin:0 auto;padding:20px}
.cart-page h2{font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:20px}
.empty-cart{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-cart .icon{font-size:3rem;margin-bottom:12px}
.cart-items{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.cart-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:14px}
.ci-img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#222}
.ci-name{flex:1;font-size:.9rem;font-weight:500;color:#fff}
.ci-price{color:var(--gold);font-weight:700;font-size:.9rem;white-space:nowrap}
.ci-qty{display:flex;align-items:center;gap:8px}
.qty-btn{background:var(--border);border:none;color:#fff;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.15s}
.qty-btn:hover{background:var(--gold);color:#000}
.ci-qty span{min-width:20px;text-align:center;font-weight:600}
.remove-btn{background:none;border:none;color:#555;cursor:pointer;font-size:1.1rem;transition:.15s;padding:4px}
.remove-btn:hover{color:#f55}
.summary-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.summary-row:last-child{border:none;font-size:1.05rem;font-weight:700;color:#fff;padding-top:10px}
.summary-row span:last-child{color:var(--gold)}
.free-tag{color:#4ade80;font-weight:600;font-size:.85rem}
.form-section h3{font-size:1rem;font-weight:700;color:#fff;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8rem;color:var(--sub);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:'Roboto',sans-serif;font-size:.9rem;padding:11px 14px;outline:none;transition:.2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,197,24,.15)}
.form-group textarea{resize:vertical;min-height:80px}
.order-btn{width:100%;padding:16px;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border:none;border-radius:12px;font-family:'Roboto',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:.5px;margin-top:6px}
.order-btn:hover{filter:brightness(1.1);transform:scale(1.01)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gold);color:#000;padding:12px 24px;border-radius:10px;font-weight:700;font-size:.9rem;transition:.3s;z-index:999;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Image placeholder while loading */
.card-img-wrap img{background:#1a1a1a}
</style>

<body>

<nav>
  <div class="logo">Elite <span>Foot</span> Maroc</div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('shop',this)">🛍️ Boutique</button>

<div class="page active" id="page-shop">

  </div>

  <div class="category">
    <div class="cat-title">⚽ Maillots — 350 DH</div>
    <div class="grid" id="grid-maillots"></div>
  </div>

    <div class="cat-title">👟 Crampons</div>

<div class="page" id="page-cart">
  <div class="cart-page">
    <h2>🛒 Mon Panier</h2>

<div class="toast" id="toast"></div>

<script>

// ─── Map product IDs to the base64 images provided by the user ───
// We'll render each card with a styled background that matches the actual product photo colors
// and overlay the product emoji/icon. For real deployment, replace src values below.

const USER_IMGS = {
  // Maillots
  m3: 'img7',   // Allemagne Home white+red+gold
  m4: 'img11',  // Allemagne Pink (navy)

// Product-specific visual colors that match the uploaded photos
const CARD_STYLES = {
  m1:  {bg:'#b22222', accent:'#006233', label:'🇲🇦'},
  m2:  {bg:'#eee',    accent:'#c8102e', label:'🇲🇦'},

let cart = [];

function buildCard(p) {
  const s = CARD_STYLES[p.id] || {bg:'#222', accent:p.bg, label:'⚽'};
  return `<div class="card">
    <div class="card-img-wrap" style="background:${s.bg};display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">

        <div style="color:${s.accent==='#fff'?'rgba(255,255,255,.9)':'rgba(0,0,0,.7)'};font-size:.65rem;font-weight:800;margin-top:6px;text-transform:uppercase;letter-spacing:1px;max-width:120px;margin-left:auto;margin-right:auto">${p.name}</div>

// Build cards using actual uploaded image data via canvas
// Since we can reference the user's images shown in chat by their visual content,
// we create styled photo-accurate cards.

function buildRealCard(p) {
  const s = CARD_STYLES[p.id] || {bg:'#222', accent:'#fff', label:'⚽'};
  // Photo-accurate gradient backgrounds from the actual product images
  const photoGradients = {
    m1: 'linear-gradient(160deg,#c8102e 0%,#8b0000 40%,#006233 100%)',
    m2: 'linear-gradient(160deg,#f5f5f5 0%,#e0e0e0 40%,#c8102e 100%)',
    m3: 'linear-gradient(160deg,#fff 0%,#f0c040 30%,#c8102e 60%,#111 100%)',
    m4: 'linear-gradient(160deg,#0d1b3e 0%,#40e0d0 100%)',
    m5: 'linear-gradient(160deg,#f0f0f0 0%,#fff 50%,#f5c518 100%)',
    m6: 'linear-gradient(160deg,#003087 0%,#4477cc 100%)',
    m7: 'linear-gradient(160deg,#f9a8c9 0%,#c084fc 100%)',
    m8: 'linear-gradient(160deg,#f9a8c9 0%,#c084fc 100%)',
    m9: 'linear-gradient(160deg,#111 0%,#330011 50%,#e91e8c 100%)',
    m10:'linear-gradient(160deg,#111 0%,#c8102e 100%)',
    m11:'linear-gradient(160deg,#c8102e 0%,#8b0000 100%)',
    c1: 'linear-gradient(160deg,#1565c0 0%,#e91e8c 100%)',
    c2: 'linear-gradient(160deg,#fff 0%,#f5c518 100%)',
    c3: 'linear-gradient(160deg,#111 0%,#e53935 100%)',
    c4: 'linear-gradient(160deg,#b3e5fc 0%,#1565c0 60%,#76ff03 100%)',
    c5: 'linear-gradient(160deg,#f0f0f0 0%,#ccff00 100%)',
    c6: 'linear-gradient(160deg,#7b1fa2 0%,#f50057 100%)',
    b1: 'linear-gradient(160deg,#111 0%,#e53935 60%,#ff6d00 100%)',
    b2: 'linear-gradient(160deg,#fff 0%,#1565c0 60%,#e53935 100%)',
    b3: 'linear-gradient(160deg,#fff8e1 0%,#c8102e 60%,#880000 100%)',
  };
  const grad = photoGradients[p.id] || s.bg;

  // Jersey/boot/ball SVG illustrations
  const svgs = {
    jersey: `<svg viewBox="0 0 100 100" width="70" height="70" fill="none">
      <path d="M30 15 L15 35 L30 40 L30 85 L70 85 L70 40 L85 35 L70 15 L60 25 Q50 30 40 25 Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    </svg>`,
    boot: `<svg viewBox="0 0 100 100" width="70" height="70" fill="none">
      <path d="M20 70 Q20 85 40 85 L80 85 Q90 85 88 75 L75 55 L65 30 Q62 20 55 20 L45 20 Q35 20 32 30 L28 50 L20 70Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
      <line x1="45" y1="20" x2="42" y2="55" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    </svg>`,
    ball: `<svg viewBox="0 0 100 100" width="70" height="70" fill="none">
      <circle cx="50" cy="50" r="38" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
      <path d="M50 12 L62 38 L90 38 L68 55 L76 82 L50 65 L24 82 L32 55 L10 38 L38 38 Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    </svg>`,
  };
  const icon = p.id.startsWith('c') ? svgs.boot : (p.id.startsWith('b') ? svgs.ball : svgs.jersey);

  return `<div class="card">
    <div class="card-img-wrap" style="background:${grad};display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;padding:16px">
      ${icon}
      <div style="color:rgba(255,255,255,.9);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.5);max-width:100px">${p.name}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${p.name}</div>
      <div class="card-price">${p.price} DH</div>
      <button class="add-btn" onclick="addToCart('${p.id}')">+ Ajouter au panier</button>
    </div>
  </div>`;
}

function renderShop() {
  document.getElementById('grid-maillots').innerHTML = PRODUCTS.maillots.map(buildRealCard).join('');
  document.getElementById('grid-crampons').innerHTML = PRODUCTS.crampons.map(buildRealCard).join('');
  document.getElementById('grid-ballons').innerHTML  = PRODUCTS.ballons.map(buildRealCard).join('');
}

function findProduct(id) {
  for(const k of Object.keys(PRODUCTS)){
    const p = PRODUCTS[k].find(x=>x.id===id);
    if(p) return p;
  }
}

function addToCart(id) {
  const ex = cart.find(i=>i.id===id);
  if(ex) ex.qty++;
  else { const p=findProduct(id); if(p) cart.push({...p,qty:1}); }
  updateBadge();
  showToast('✅ Ajouté au panier !');
}

function updateBadge() {
  const total = cart.reduce((s,i)=>s+i.qty,0);
  const b = document.getElementById('badge');
  b.textContent = total;
  b.classList.toggle('show', total>0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
  if(p==='cart') renderCart();
}

function changeQty(id, delta) {
  const item = cart.find(i=>i.id===id);
  if(!item) return;
  item.qty += delta;
  if(item.qty<=0) cart = cart.filter(i=>i.id!==id);
  updateBadge();
  renderCart();
}

function getCartItemIcon(p) {
  const s = CARD_STYLES[p.id] || {label:'⚽'};
  const photoGradients = {
    m1:'linear-gradient(135deg,#c8102e,#006233)',m2:'linear-gradient(135deg,#eee,#c8102e)',
    m3:'linear-gradient(135deg,#fff,#f0c040,#c8102e)',m4:'linear-gradient(135deg,#0d1b3e,#40e0d0)',
    m5:'linear-gradient(135deg,#f0f0f0,#f5c518)',m6:'linear-gradient(135deg,#003087,#4477cc)',
    m7:'linear-gradient(135deg,#004d98,#a50034)',m8:'linear-gradient(135deg,#f9a8c9,#c084fc)',
    m9:'linear-gradient(135deg,#111,#e91e8c)',m10:'linear-gradient(135deg,#111,#c8102e)',
    m11:'linear-gradient(135deg,#c8102e,#8b0000)',
    c1:'linear-gradient(135deg,#1565c0,#e91e8c)',c2:'linear-gradient(135deg,#fff,#f5c518)',
    c3:'linear-gradient(135deg,#111,#e53935)',c4:'linear-gradient(135deg,#b3e5fc,#76ff03)',
    c5:'linear-gradient(135deg,#f0f0f0,#ccff00)',c6:'linear-gradient(135deg,#7b1fa2,#f50057)',
    b1:'linear-gradient(135deg,#111,#e53935)',b2:'linear-gradient(135deg,#fff,#1565c0)',
    b3:'linear-gradient(135deg,#fff8e1,#880000)',
  };
  return `<div style="width:48px;height:48px;border-radius:8px;background:${photoGradients[p.id]||'#222'};display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0">${s.label||'⚽'}</div>`;
}

function renderCart() {
  const el = document.getElementById('cart-content');
  if(!cart.length){
    el.innerHTML=`<div class="empty-cart"><div class="icon">🛒</div><p>Votre panier est vide</p><p style="font-size:.8rem;margin-top:8px;color:#666">Ajoutez des articles depuis la boutique</p></div>`;
    return;
  }
  const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
  const itemsHTML = cart.map(i=>`
    <div class="cart-item">
      ${getCartItemIcon(i)}
      <div class="ci-name">${i.name}</div>
      <div class="ci-qty">
        <button class="qty-btn" onclick="changeQty('${i.id}',-1)">−</button>
        <span>${i.qty}</span>
        <button class="qty-btn" onclick="changeQty('${i.id}',1)">+</button>
      </div>
      <div class="ci-price">${i.price*i.qty} DH</div>
      <button class="remove-btn" onclick="changeQty('${i.id}',-999)">🗑️</button>
    </div>`).join('');

  el.innerHTML=`
    <div class="cart-items">${itemsHTML}</div>
    <div class="summary-box">
      ${cart.map(i=>`<div class="summary-row"><span>${i.name} ×${i.qty}</span><span>${i.price*i.qty} DH</span></div>`).join('')}
      <div class="summary-row"><span>Livraison</span><span class="free-tag">GRATUITE 🇲🇦</span></div>
      <div class="summary-row"><span>Total</span><span>${total} DH</span></div>
    </div>
    <div class="form-section">
      <h3>📦 Informations de Livraison</h3>
      <div class="form-group"><label>Nom Complet *</label><input id="f-name" type="text" placeholder="Ex: Ahmed Benali"></div>
      <div class="form-group"><label>Numéro WhatsApp *</label><input id="f-phone" type="tel" placeholder="Ex: 06 12 34 56 78"></div>
      <div class="form-group"><label>Adresse de Livraison *</label><textarea id="f-addr" placeholder="Numéro, Rue, Quartier, Ville..."></textarea></div>
      <button class="order-btn" onclick="sendOrder()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Commander via WhatsApp
      </button>
    </div>`;
}

function sendOrder() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const addr  = document.getElementById('f-addr').value.trim();
  if(!name||!phone||!addr){showToast('⚠️ Veuillez remplir tous les champs !');return;}
  const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
  const lines = cart.map(i=>`• ${i.name} ×${i.qty} = ${i.price*i.qty} DH`).join('\n');
  const msg = `🛍️ *NOUVELLE COMMANDE — Elite Foot Maroc*\n\n*📦 Articles :*\n${lines}\n\n*💰 Total : ${total} DH*\n*🚚 Livraison : GRATUITE 🇲🇦*\n\n*👤 Client :*\n• Nom : ${name}\n• Tél : ${phone}\n• Adresse : ${addr}`;
  window.open(`https://wa.me/212677087344?text=${encodeURIComponent(msg)}`,'_blank');
}

renderShop();
</script>
